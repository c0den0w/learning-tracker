<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learning Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=Geist:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fafaf9;--surface:#ffffff;--border:#e5e5e4;--border-light:#f0f0ef;
  --text:#1c1c1a;--muted:#737370;--hint:#a8a8a5;
  --green-bg:#f0fdf4;--green-border:#bbf7d0;--green-text:#15803d;
  --amber-bg:#fffbeb;--amber-border:#fde68a;--amber-text:#92400e;
  --red-bg:#fef2f2;--red-border:#fecaca;--red-text:#991b1b;
  --blue-bg:#eff6ff;--blue-border:#bfdbfe;--blue-text:#1e40af;
  --purple-bg:#fdf4ff;--purple-border:#e9d5ff;--purple-text:#7e22ce;
  --radius:8px;--radius-lg:12px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#0c0c0b;--surface:#161615;--border:#2a2a28;--border-light:#1f1f1d;
    --text:#f0f0ee;--muted:#888885;--hint:#555552;
    --green-bg:#052e16;--green-border:#166534;--green-text:#86efac;
    --amber-bg:#1c1400;--amber-border:#92400e;--amber-text:#fcd34d;
    --red-bg:#1c0a0a;--red-border:#991b1b;--red-text:#fca5a5;
    --blue-bg:#0c1a2e;--blue-border:#1e3a5f;--blue-text:#93c5fd;
    --purple-bg:#1a0b2e;--purple-border:#5b21b6;--purple-text:#d8b4fe;
  }
}
body{font-family:'Geist',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5;font-size:14px}
.page{max-width:760px;margin:0 auto;padding:48px 24px 80px}
.page-header{margin-bottom:40px;padding-bottom:24px;border-bottom:1px solid var(--border)}
.page-header h1{font-size:22px;font-weight:500;letter-spacing:-0.02em;margin-bottom:4px}
.page-header p{font-size:13px;color:var(--muted)}
.summary-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:32px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;font-family:'Geist Mono',monospace}
.stat-value{font-size:22px;font-weight:500;letter-spacing:-0.02em;font-variant-numeric:tabular-nums}
.stat-sub{font-size:11px;color:var(--hint);margin-top:2px}
.goals-list{display:flex;flex-direction:column;gap:16px}
.goal-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:border-color 0.15s;animation:fadeIn 0.2s ease}
.goal-card:hover{border-color:var(--muted)}
.goal-card.complete{border-color:var(--green-border)}
.goal-card.overdue{border-color:var(--red-border)}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.goal-header{padding:16px 18px;display:flex;align-items:flex-start;gap:12px;border-bottom:1px solid var(--border-light)}
.goal-meta{flex:1;min-width:0}
.goal-title-row{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.goal-title-input{font-size:15px;font-weight:500;font-family:inherit;letter-spacing:-0.01em;background:transparent;border:none;outline:none;width:100%;color:var(--text);padding:0}
.goal-title-input::placeholder{color:var(--hint)}
.goal-info{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.deadline-text{font-size:12px;color:var(--muted);font-family:'Geist Mono',monospace}
.deadline-text.urgent{color:var(--amber-text)}.deadline-text.overdue{color:var(--red-text)}.deadline-text.done{color:var(--green-text)}
.progress-wrap{display:flex;align-items:center;gap:8px;flex:1}
.progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;flex:1;min-width:80px}
.progress-fill{height:100%;background:var(--text);border-radius:2px;transition:width 0.3s ease}
.goal-card.complete .progress-fill{background:var(--green-text)}.goal-card.overdue .progress-fill{background:var(--red-text)}
.progress-pct{font-size:11px;color:var(--muted);font-family:'Geist Mono',monospace;min-width:28px;text-align:right}
.goal-actions{display:flex;align-items:center;gap:4px;flex-shrink:0}
.icon-btn{width:28px;height:28px;border:none;background:transparent;border-radius:var(--radius);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--hint);transition:background 0.1s,color 0.1s}
.icon-btn:hover{background:var(--border-light);color:var(--text)}.icon-btn.danger:hover{background:var(--red-bg);color:var(--red-text)}
.icon-btn svg{width:14px;height:14px}
.badge{font-size:11px;padding:2px 8px;border-radius:999px;border:1px solid;font-family:'Geist Mono',monospace;white-space:nowrap}
.badge-green{background:var(--green-bg);border-color:var(--green-border);color:var(--green-text)}
.badge-red{background:var(--red-bg);border-color:var(--red-border);color:var(--red-text)}
.resources-block{padding:10px 18px;border-bottom:1px solid var(--border-light)}
.resources-label{font-size:11px;color:var(--hint);font-family:'Geist Mono',monospace;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:7px}
.link-list{display:flex;flex-direction:column;gap:2px;margin-bottom:6px}
.link-item{display:flex;align-items:center;gap:8px;padding:4px 0}
.link-icon{width:13px;height:13px;flex-shrink:0;color:var(--hint)}
.link-anchor{font-size:12px;color:var(--blue-text);font-family:'Geist Mono',monospace;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-decoration:none}
.link-anchor:hover{text-decoration:underline}
.link-del{width:20px;height:20px;border:none;background:transparent;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--hint);opacity:0;transition:opacity 0.1s,background 0.1s,color 0.1s;flex-shrink:0}
.link-item:hover .link-del{opacity:1}.link-del:hover{background:var(--red-bg);color:var(--red-text)}
.link-del svg{width:11px;height:11px}
.add-link-row{display:flex;gap:6px}
.link-input{flex:1;font-size:12px;font-family:'Geist Mono',monospace;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);padding:5px 8px;outline:none;transition:border-color 0.15s;min-width:0}
.link-input:focus{border-color:var(--muted)}.link-input::placeholder{color:var(--hint)}
.small-btn{font-size:11px;font-family:'Geist Mono',monospace;background:transparent;border:1px solid var(--border);border-radius:var(--radius);color:var(--muted);cursor:pointer;padding:5px 10px;transition:all 0.1s;white-space:nowrap;flex-shrink:0}
.small-btn:hover{background:var(--border-light);color:var(--text);border-color:var(--muted)}
.task-list{padding:4px 0}
.task-row{transition:background 0.1s}
.task-row.expanded{background:var(--border-light)}
.task-item{display:flex;align-items:center;gap:10px;padding:8px 18px;transition:background 0.1s}
.task-item:hover{background:var(--border-light)}
.task-row.expanded .task-item{background:var(--border-light)}
.task-checkbox{width:16px;height:16px;border:1.5px solid var(--border);border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:border-color 0.15s,background 0.15s;background:transparent}
.task-checkbox:hover{border-color:var(--muted)}.task-checkbox.checked{background:var(--text);border-color:var(--text)}
.task-checkbox.checked svg{display:block}.task-checkbox svg{display:none;width:10px;height:10px}
.task-type{font-size:10px;padding:2px 7px;border-radius:999px;border:1px solid;font-family:'Geist Mono',monospace;cursor:pointer;transition:opacity 0.1s;flex-shrink:0;background:none}
.task-type:hover{opacity:0.7}
.task-type[data-t="learn"]{background:var(--blue-bg);border-color:var(--blue-border);color:var(--blue-text)}
.task-type[data-t="build"]{background:var(--amber-bg);border-color:var(--amber-border);color:var(--amber-text)}
.task-type[data-t="assess"]{background:var(--green-bg);border-color:var(--green-border);color:var(--green-text)}
.task-type[data-t="cert"]{background:var(--purple-bg);border-color:var(--purple-border);color:var(--purple-text)}
.task-label-input{font-size:13.5px;font-family:inherit;background:transparent;border:none;outline:none;width:100%;color:var(--text);padding:0;line-height:1.4}
.task-label-input::placeholder{color:var(--hint)}.task-label-input.done{color:var(--hint);text-decoration:line-through}
.indicator-dot{width:5px;height:5px;border-radius:50%;background:var(--blue-text);flex-shrink:0;opacity:0.7}
.expand-btn{width:22px;height:22px;border:none;background:transparent;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--hint);transition:background 0.1s,color 0.1s;flex-shrink:0}
.expand-btn:hover{background:var(--border);color:var(--text)}.expand-btn svg{width:12px;height:12px}
.task-del{width:22px;height:22px;border:none;background:transparent;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--hint);opacity:0;transition:opacity 0.1s,background 0.1s,color 0.1s;flex-shrink:0}
.task-item:hover .task-del{opacity:1}.task-del:hover{background:var(--red-bg);color:var(--red-text)}.task-del svg{width:12px;height:12px}
.task-detail{padding:14px 18px 16px 44px;display:flex;flex-direction:column;gap:14px;border-top:1px solid var(--border)}
.detail-group{display:flex;flex-direction:column;gap:6px}
.detail-group-label{font-size:11px;color:var(--hint);font-family:'Geist Mono',monospace;text-transform:uppercase;letter-spacing:0.06em}
.detail-textarea{font-size:13px;font-family:inherit;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);padding:8px 10px;resize:vertical;outline:none;line-height:1.55;transition:border-color 0.15s;width:100%;min-height:60px}
.detail-textarea:focus{border-color:var(--muted)}.detail-textarea::placeholder{color:var(--hint)}
.notes-textarea{min-height:76px;border-color:var(--border);border-style:dashed}
.notes-textarea:focus,.notes-textarea:not(:placeholder-shown){border-style:solid}
.add-task-row{padding:8px 18px 10px;display:flex;align-items:center;gap:10px}
.add-task-input{flex:1;font-size:13px;font-family:inherit;background:transparent;border:none;outline:none;color:var(--text);padding:0}
.add-task-input::placeholder{color:var(--hint)}
.add-task-btn{font-size:12px;font-family:'Geist Mono',monospace;background:transparent;border:1px solid var(--border);border-radius:var(--radius);color:var(--muted);cursor:pointer;padding:4px 10px;transition:all 0.1s;white-space:nowrap}
.add-task-btn:hover{background:var(--border-light);color:var(--text);border-color:var(--muted)}
.type-selector{display:flex;gap:4px;flex-shrink:0}
.type-pill{font-size:10px;padding:3px 8px;border-radius:999px;border:1px solid var(--border);cursor:pointer;color:var(--muted);background:transparent;font-family:'Geist Mono',monospace;transition:all 0.1s}
.type-pill.active[data-t="learn"]{background:var(--blue-bg);border-color:var(--blue-border);color:var(--blue-text)}
.type-pill.active[data-t="build"]{background:var(--amber-bg);border-color:var(--amber-border);color:var(--amber-text)}
.type-pill.active[data-t="assess"]{background:var(--green-bg);border-color:var(--green-border);color:var(--green-text)}
.type-pill.active[data-t="cert"]{background:var(--purple-bg);border-color:var(--purple-border);color:var(--purple-text)}
.goal-footer{padding:10px 18px;border-top:1px solid var(--border-light);display:flex;align-items:center;justify-content:space-between}
.deadline-picker{display:flex;align-items:center;gap:8px}
.deadline-label{font-size:11px;color:var(--hint);font-family:'Geist Mono',monospace}
.deadline-input{font-size:12px;font-family:'Geist Mono',monospace;background:transparent;border:1px solid var(--border);border-radius:var(--radius);color:var(--text);padding:4px 8px;cursor:pointer;outline:none;transition:border-color 0.15s}
.deadline-input:hover{border-color:var(--muted)}.deadline-input:focus{border-color:var(--text)}
.task-count{font-size:11px;color:var(--hint);font-family:'Geist Mono',monospace}
.week-timeline{display:flex;gap:4px;align-items:center}
.week-dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:background 0.2s}
.week-dot.past{background:var(--text)}.week-dot.current{background:var(--text);box-shadow:0 0 0 2px var(--bg),0 0 0 3px var(--text)}
.wdiv{font-size:11px;color:var(--hint);font-family:'Geist Mono',monospace;margin:0 2px}
.add-goal-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;background:transparent;border:1.5px dashed var(--border);border-radius:var(--radius-lg);color:var(--muted);font-size:13px;font-family:inherit;cursor:pointer;transition:border-color 0.15s,color 0.15s,background 0.15s;margin-top:4px}
.add-goal-btn:hover{border-color:var(--muted);color:var(--text);background:var(--surface)}.add-goal-btn:disabled{opacity:0.4;cursor:not-allowed}
.add-goal-btn svg{width:14px;height:14px}
.limit-note{text-align:center;font-size:12px;color:var(--hint);margin-top:10px;font-family:'Geist Mono',monospace}
.empty-state{text-align:center;padding:48px 24px;color:var(--hint);font-size:13px;line-height:2}
.empty-state strong{display:block;font-size:15px;font-weight:500;color:var(--muted);margin-bottom:4px}
.collapsed .task-list,.collapsed .add-task-row,.collapsed .goal-footer,.collapsed .resources-block{display:none}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:var(--bg);font-size:13px;padding:10px 18px;border-radius:var(--radius);transition:transform 0.2s ease;z-index:100;pointer-events:none;white-space:nowrap;font-family:'Geist Mono',monospace}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="page">
  <div class="page-header">
    <h1>Learning tracker</h1>
    <p>Up to 3 goals Â· 3 weeks each Â· track what you're learning, building, and shipping</p>
  </div>
  <div class="summary-bar">
    <div class="stat">
      <div class="stat-label">goals active</div>
      <div class="stat-value" id="stat-goals">0</div>
      <div class="stat-sub">of 3 max</div>
    </div>
    <div class="stat">
      <div class="stat-label">tasks done</div>
      <div class="stat-value" id="stat-done">0</div>
      <div class="stat-sub" id="stat-done-sub">of 0 total</div>
    </div>
    <div class="stat">
      <div class="stat-label">completion</div>
      <div class="stat-value" id="stat-pct">â</div>
      <div class="stat-sub">overall progress</div>
    </div>
  </div>
  <div id="goals-list" class="goals-list"></div>
  <button class="add-goal-btn" id="add-goal-btn" onclick="addGoal()">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/></svg>
    Add learning goal
  </button>
  <div class="limit-note" id="limit-note" style="display:none">3 goal limit reached â complete or remove a goal to add a new one</div>
</div>
<div class="toast" id="toast"></div>
<script>
const SK='lt_v2';
let S={goals:[]};

function load(){
  try{const s=localStorage.getItem(SK);if(s)S=JSON.parse(s);}catch(e){}
  if(!S.goals)S.goals=[];
  S.goals.forEach(g=>{
    if(!g.links)g.links=[];
    (g.tasks||[]).forEach(t=>{
      if(!t.links)t.links=[];
      if(t.description==null)t.description='';
      if(t.notes==null)t.notes='';
      if(t.expanded==null)t.expanded=false;
    });
  });
}
function save(){localStorage.setItem(SK,JSON.stringify(S));}
function uid(){return Math.random().toString(36).slice(2,9);}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2200);}
function daysLeft(d){if(!d)return null;const n=new Date();n.setHours(0,0,0,0);const dl=new Date(d);dl.setHours(0,0,0,0);return Math.round((dl-n)/86400000);}
function maxDl(){const d=new Date();d.setDate(d.getDate()+21);return d.toISOString().split('T')[0];}
function minDl(){return new Date().toISOString().split('T')[0];}
function dlLabel(dl,done){
  if(!dl)return{text:'no deadline set',cls:''};
  const d=daysLeft(dl);
  if(done)return{text:'completed',cls:'done'};
  if(d<0)return{text:`${Math.abs(d)}d overdue`,cls:'overdue'};
  if(d===0)return{text:'due today',cls:'urgent'};
  if(d<=3)return{text:`${d}d left`,cls:'urgent'};
  return{text:`${d}d left`,cls:''};
}
function G(gid){return S.goals.find(g=>g.id===gid);}
function T(gid,tid){return G(gid).tasks.find(t=>t.id===tid);}

function addGoal(){
  if(S.goals.length>=3){toast('3 goal limit reached');return;}
  S.goals.push({id:uid(),title:'',deadline:maxDl(),tasks:[],links:[],collapsed:false});
  save();render();
  setTimeout(()=>{const ins=document.querySelectorAll('.goal-title-input');if(ins.length)ins[ins.length-1].focus();},50);
}
function deleteGoal(gid){S.goals=S.goals.filter(g=>g.id!==gid);save();render();}
function toggleCollapse(gid){G(gid).collapsed=!G(gid).collapsed;save();render();}
function updateGoalTitle(gid,v){G(gid).title=v;save();}
function updateDeadline(gid,v){if(v>maxDl()){v=maxDl();toast('max 3 weeks from today');}G(gid).deadline=v;save();render();}

function addGoalLink(gid){
  const u=document.getElementById('gl-u-'+gid);
  const l=document.getElementById('gl-l-'+gid);
  const url=u.value.trim();if(!url)return;
  const href=url.startsWith('http')?url:'https://'+url;
  G(gid).links.push({id:uid(),url:href,label:l.value.trim()||href});
  u.value='';l.value='';save();render();
  setTimeout(()=>document.getElementById('gl-u-'+gid)?.focus(),30);
}
function delGoalLink(gid,lid){G(gid).links=G(gid).links.filter(l=>l.id!==lid);save();render();}

function addTask(gid){
  const inp=document.getElementById('nt-'+gid);
  const tp=document.querySelector(`[data-goal="${gid}"] .type-pill.active`);
  const text=inp.value.trim();if(!text)return;
  G(gid).tasks.push({id:uid(),text,type:tp?tp.dataset.t:'learn',done:false,description:'',notes:'',links:[],expanded:false});
  inp.value='';save();render();
  setTimeout(()=>document.getElementById('nt-'+gid)?.focus(),30);
}
function delTask(gid,tid){G(gid).tasks=G(gid).tasks.filter(t=>t.id!==tid);save();render();}
function toggleTask(gid,tid){T(gid,tid).done=!T(gid,tid).done;save();render();}
function cycleType(gid,tid){const t=T(gid,tid);const types=['learn','build','assess','cert'];t.type=types[(types.indexOf(t.type)+1)%types.length];save();render();}
function toggleExpand(gid,tid){T(gid,tid).expanded=!T(gid,tid).expanded;save();render();}
function updateTaskText(gid,tid,v){T(gid,tid).text=v;save();}
function updateDesc(gid,tid,v){T(gid,tid).description=v;save();}
function updateNotes(gid,tid,v){T(gid,tid).notes=v;save();}

function addTaskLink(gid,tid){
  const u=document.getElementById(`tl-u-${gid}-${tid}`);
  const l=document.getElementById(`tl-l-${gid}-${tid}`);
  const url=u.value.trim();if(!url)return;
  const href=url.startsWith('http')?url:'https://'+url;
  T(gid,tid).links.push({id:uid(),url:href,label:l.value.trim()||href});
  u.value='';l.value='';save();render();
  setTimeout(()=>document.getElementById(`tl-u-${gid}-${tid}`)?.focus(),30);
}
function delTaskLink(gid,tid,lid){T(gid,tid).links=T(gid,tid).links.filter(l=>l.id!==lid);save();render();}
function selectType(gid,type){document.querySelectorAll(`[data-goal="${gid}"] .type-pill`).forEach(p=>p.classList.toggle('active',p.dataset.t===type));}

function weekDots(dl){
  if(!dl)return'';
  const d=daysLeft(dl);
  const el=Math.max(0,Math.min(21,21-d));
  let h='<div class="week-timeline">';
  for(let i=0;i<21;i++){
    const cls=i<el?'past':i===el?'current':'';
    h+=`<div class="week-dot ${cls}"></div>`;
    if(i===6||i===13)h+='<span class="wdiv">Â·</span>';
  }
  return h+'</div>';
}

function linkChain(icon){
  return`<svg class="link-icon" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5.5 8.5a3 3 0 004.243 0l2-2a3 3 0 00-4.243-4.243l-1 1"/><path d="M8.5 5.5a3 3 0 00-4.243 0l-2 2a3 3 0 004.243 4.243l1-1"/></svg>`;
}
function xIcon(){
  return`<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="2" y1="2" x2="10" y2="10"/><line x1="10" y1="2" x2="2" y2="10"/></svg>`;
}

function renderLinkList(links, delFn){
  return links.map(l=>`
    <div class="link-item">
      ${linkChain()}
      <a class="link-anchor" href="${esc(l.url)}" target="_blank" rel="noopener" title="${esc(l.url)}">${esc(l.label||l.url)}</a>
      <button class="link-del" onclick="${delFn}('${l.id}')">${xIcon()}</button>
    </div>`).join('');
}

function render(){
  const list=document.getElementById('goals-list');
  const btn=document.getElementById('add-goal-btn');
  document.getElementById('limit-note').style.display=S.goals.length>=3?'block':'none';
  btn.disabled=S.goals.length>=3;

  let td=0,tt=0;
  S.goals.forEach(g=>{tt+=g.tasks.length;td+=g.tasks.filter(t=>t.done).length;});
  document.getElementById('stat-goals').textContent=S.goals.length;
  document.getElementById('stat-done').textContent=td;
  document.getElementById('stat-done-sub').textContent=`of ${tt} total`;
  document.getElementById('stat-pct').textContent=tt?Math.round(td/tt*100)+'%':'â';

  if(!S.goals.length){
    list.innerHTML=`<div class="empty-state"><strong>No goals yet</strong>Add up to 3 learning goals below.<br>Each goal can have tasks tagged as learn, build, assess, or cert.</div>`;
    return;
  }

  list.innerHTML=S.goals.map(goal=>{
    const done=goal.tasks.filter(t=>t.done).length;
    const total=goal.tasks.length;
    const pct=total?Math.round(done/total*100):0;
    const allDone=total>0&&done===total;
    const dl=dlLabel(goal.deadline,allDone);
    const d=daysLeft(goal.deadline);
    const overdue=d!==null&&d<0&&!allDone;
    const cls=allDone?'goal-card complete':overdue?'goal-card overdue':'goal-card';

    const tasksHtml=goal.tasks.map(task=>{
      const hasExtra=task.description||task.notes||task.links.length>0;
      const detailHtml=task.expanded?`
        <div class="task-detail">
          <div class="detail-group">
            <span class="detail-group-label">description</span>
            <textarea class="detail-textarea" placeholder="What does this task involve? (optional)"
              onblur="updateDesc('${goal.id}','${task.id}',this.value)">${esc(task.description)}</textarea>
          </div>
          <div class="detail-group">
            <span class="detail-group-label">learnings &amp; notes</span>
            <textarea class="detail-textarea notes-textarea" placeholder="What did you learn? Record key takeaways after completing thisâ¦"
              onblur="updateNotes('${goal.id}','${task.id}',this.value)">${esc(task.notes)}</textarea>
          </div>
          <div class="detail-group">
            <span class="detail-group-label">resources${task.links.length?` (${task.links.length})`:''}</span>
            ${task.links.length?`<div class="link-list">${renderLinkList(task.links,`(lid)=>delTaskLink('${goal.id}','${task.id}',lid)`)}</div>`:''}
            <div class="add-link-row" style="margin-top:4px">
              <input class="link-input" id="tl-u-${goal.id}-${task.id}" placeholder="https://â¦" onkeydown="if(event.key==='Enter')addTaskLink('${goal.id}','${task.id}')">
              <input class="link-input" id="tl-l-${goal.id}-${task.id}" placeholder="label" style="max-width:150px" onkeydown="if(event.key==='Enter')addTaskLink('${goal.id}','${task.id}')">
              <button class="small-btn" onclick="addTaskLink('${goal.id}','${task.id}')">+ add</button>
            </div>
          </div>
        </div>`:' ';

      return`<div class="task-row${task.expanded?' expanded':''}">
        <div class="task-item">
          <div class="task-checkbox${task.done?' checked':''}" onclick="toggleTask('${goal.id}','${task.id}')">
            <svg viewBox="0 0 10 10" fill="none" stroke="white" stroke-width="1.5"><polyline points="1.5,5 4,7.5 8.5,2.5"/></svg>
          </div>
          <button class="task-type" data-t="${task.type}" onclick="cycleType('${goal.id}','${task.id}')" title="click to cycle type">${task.type}</button>
          <input class="task-label-input${task.done?' done':''}" value="${esc(task.text)}"
            onblur="updateTaskText('${goal.id}','${task.id}',this.value)"
            onkeydown="if(event.key==='Enter')this.blur()"
            placeholder="task name">
          ${hasExtra?`<div class="indicator-dot" title="has notes or links"></div>`:''}
          <button class="expand-btn" onclick="toggleExpand('${goal.id}','${task.id}')" title="${task.expanded?'collapse':'expand'}">
            <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5">
              ${task.expanded?'<polyline points="2,8 6,4 10,8"/>':'<polyline points="2,4 6,8 10,4"/>'}
            </svg>
          </button>
          <button class="task-del" onclick="delTask('${goal.id}','${task.id}')">
            <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="2" y1="2" x2="12" y2="12"/><line x1="12" y1="2" x2="2" y2="12"/></svg>
          </button>
        </div>
        ${detailHtml}
      </div>`;
    }).join('');

    return`<div class="${cls}${goal.collapsed?' collapsed':''}" data-goal="${goal.id}">
      <div class="goal-header">
        <div class="goal-meta">
          <div class="goal-title-row">
            <input class="goal-title-input" value="${esc(goal.title)}" placeholder="Name this goalâ¦"
              onblur="updateGoalTitle('${goal.id}',this.value)"
              onkeydown="if(event.key==='Enter')this.blur()">
            ${allDone?`<span class="badge badge-green">done</span>`:overdue?`<span class="badge badge-red">overdue</span>`:''}
          </div>
          <div class="goal-info">
            <span class="deadline-text ${dl.cls}">${dl.text}</span>
            ${total>0?`<div class="progress-wrap">
              <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
              <span class="progress-pct">${pct}%</span>
            </div>`:''}
          </div>
        </div>
        <div class="goal-actions">
          <button class="icon-btn" onclick="toggleCollapse('${goal.id}')" title="${goal.collapsed?'expand':'collapse'}">
            <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5">
              ${goal.collapsed?'<polyline points="3,5 7,9 11,5"/>':'<polyline points="3,9 7,5 11,9"/>'}
            </svg>
          </button>
          <button class="icon-btn danger" onclick="deleteGoal('${goal.id}')" title="remove goal">
            <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="2,4 12,4"/><path d="M5,4V3h4v1"/><path d="M3,4l1,8h6l1-8"/></svg>
          </button>
        </div>
      </div>

      <div class="resources-block">
        <div class="resources-label">goal resources${goal.links.length?` (${goal.links.length})`:''}</div>
        ${goal.links.length?`<div class="link-list">${renderLinkList(goal.links,`(lid)=>delGoalLink('${goal.id}',lid)`)}</div>`:''}
        <div class="add-link-row">
          <input class="link-input" id="gl-u-${goal.id}" placeholder="https://â¦" onkeydown="if(event.key==='Enter')addGoalLink('${goal.id}')">
          <input class="link-input" id="gl-l-${goal.id}" placeholder="label" style="max-width:150px" onkeydown="if(event.key==='Enter')addGoalLink('${goal.id}')">
          <button class="small-btn" onclick="addGoalLink('${goal.id}')">+ add</button>
        </div>
      </div>

      <div class="task-list">${tasksHtml}</div>

      <div class="add-task-row">
        <div class="task-checkbox" style="opacity:0.25;pointer-events:none">
          <svg viewBox="0 0 10 10" fill="none" stroke="white" stroke-width="1.5"><polyline points="1.5,5 4,7.5 8.5,2.5"/></svg>
        </div>
        <div class="type-selector">
          <button class="type-pill active" data-t="learn" onclick="selectType('${goal.id}','learn')">learn</button>
          <button class="type-pill" data-t="build" onclick="selectType('${goal.id}','build')">build</button>
          <button class="type-pill" data-t="assess" onclick="selectType('${goal.id}','assess')">assess</button>
          <button class="type-pill" data-t="cert" onclick="selectType('${goal.id}','cert')">cert</button>
        </div>
        <input class="add-task-input" id="nt-${goal.id}" placeholder="Add a taskâ¦" onkeydown="if(event.key==='Enter')addTask('${goal.id}')">
        <button class="add-task-btn" onclick="addTask('${goal.id}')">+ add</button>
      </div>

      <div class="goal-footer">
        <div class="deadline-picker">
          <span class="deadline-label">deadline</span>
          <input type="date" class="deadline-input" value="${goal.deadline||''}"
            min="${minDl()}" max="${maxDl()}"
            onchange="updateDeadline('${goal.id}',this.value)">
        </div>
        <div style="display:flex;align-items:center;gap:12px">
          ${weekDots(goal.deadline)}
          <span class="task-count">${done}/${total} tasks</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

load();render();
</script>
